services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-app
    restart: always
    env_file: .env
    expose:
      - "18789"
    volumes:
      - ./openclaw/data:/home/node/.openclaw
      - ./openclaw/obsidian-data:/home/node/obsidian-data
      - ./openclaw/skills:/home/node/skills
    networks:
      - openclaw-net

  caddy:
    image: caddy:latest
    container_name: openclaw-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/caddy/config:/config
    networks:
      - openclaw-net
  
  obsidian-vault:
    image: linuxserver/syncthing
    container_name: openclaw-obsidian
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./syncthing/config:/config
      - ./openclaw/obsidian-data:/data/obsidian-data
    ports:
      - "22000:22000"
      - "21027:21027/udp"
      - "127.0.0.1:8384:8384"

networks:
  openclaw-net:
    driver: bridge
