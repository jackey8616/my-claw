services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_VERSION_TAG}
    container_name: openclaw-app
    restart: always
    env_file: .env
    environment:
      - NPM_CONFIG_PREFIX=/home/node/.npm-global
    expose:
      - "18789"
    volumes:
      - /home/openclaw/openclaw-data/openclaw:/home/node/.openclaw
      - /home/openclaw/openclaw-data/vault:/home/node/vault
      - ./openclaw/skills:/home/node/skills
      - .:/home/node/my-claw
      - /dev/null:/home/node/my-claw/.env
    networks:
      - openclaw-net

  caddy:
    image: caddy:latest
    container_name: openclaw-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - /home/openclaw/openclaw-data/caddy-data:/data
      - /home/openclaw/openclaw-data/caddy-config:/config
    networks:
      - openclaw-net
  
  obsidian-vault:
    image: linuxserver/syncthing
    container_name: openclaw-obsidian
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /home/openclaw/openclaw-data/syncthing:/config
      - /home/openclaw/openclaw-data/vault:/data/obsidian-data
    ports:
      - "22000:22000"
      - "21027:21027/udp"
      - "127.0.0.1:8384:8384"

networks:
  openclaw-net:
    driver: bridge
